name: pull_request

on:
  pull_request:
    branches: [master, dev]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci?sslmode=disable
      PAYLOAD_SECRET: ci-only-not-a-real-secret-1234567890abcdef
      NEXT_PUBLIC_SITE_URL: https://example.com

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Push schema to CI Postgres
        env:
          NODE_ENV: development
          PAYLOAD_DB_PUSH: 'true'
        run: pnpm db:push

      - name: Build
        run: pnpm build

      - name: Test (Vitest integration)
        run: pnpm test:int
